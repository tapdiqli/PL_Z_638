<section class="hero">
  <div class="hero-glow hero-glow--pink"></div>
  <div class="hero-glow hero-glow--blue"></div>

  <div class="container hero-grid">
    <div class="hero-content">
      <span class="hero-updated">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Updated on {{ updatedOn }}
      </span>

      <h1 class="hero-title">10 Best Online Casino Sites UK</h1>

      <div class="hero-badges">
        <span class="hero-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
          UK Licensed
        </span>
        <span class="hero-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Trusted &amp; Secure
        </span>
        <span class="hero-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Fast Withdrawals
        </span>
      </div>
    </div>

    <div class="hero-visual" aria-hidden="true">
      <div class="slot-machine">
        <div class="slot-arch">
          <span class="slot-bulb"></span>
          <span class="slot-bulb"></span>
          <span class="slot-bulb"></span>
          <span class="slot-bulb"></span>
          <span class="slot-bulb"></span>
        </div>
        <div class="slot-reels">
          <span class="reel">7</span>
          <span class="reel">7</span>
          <span class="reel">7</span>
        </div>
        <div class="slot-base"></div>
      </div>
      <span class="floating-chip chip-1"></span>
      <span class="floating-chip chip-2"></span>
      <span class="floating-chip chip-3"></span>
    </div>
  </div>
</section>
